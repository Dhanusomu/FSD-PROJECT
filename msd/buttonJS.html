<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="add()">Add</button>
    <button onclick="sub()">Subtract</button>
    <button onclick="mul()">Product</button>
    <button onclick="div()">Division</button>
    <button onclick="mod()">Modulus</button>
</body>
<script>
    function add(){
        var n1 = 5;
        var n2 = 3;
        alert(n1+n2);
    }
    function sub(){
        var n1 = 5;
        var n2 = 3;
        alert(n1-n2);
    }
    function mul(){
        var n1 = 5;
        var n2 = 3;
        alert(n1*n2);
    }
    function div(){
        var n1 = 5;
        var n2 = 3;
        alert(n1/n2);
    }
    function mod(){
        var n1 = 5;
        var n2 = 3;
        alert(n1%n2);
    }
    
</script>
</html>
