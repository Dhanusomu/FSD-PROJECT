<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<style>
    #calculator{
        color: red;
    }
    #calculator button{
        color: red;
    }
</style>
<body bgcolor="#faebd7">
<div id="calculator">
   <div> <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <br>
    <br>
       <div>
    <button onclick="add()">+</button>
    <button onclick="sub()">-</button>
    <button onclick="mul()">*</button>
    <button onclick="div()">/</button>
    <button onclick="pow()">^</button>
       </div>
    <button onclick="sqrt()">√</button>
    <button onclick="sin()">sin</button>
    <button onclick="cos()">cos</button>
    <button onclick="tan()">tan</button>
    <button onclick="log()">log</button>

   </div>
    <div>
        <button onclick="spiral()">Spiral matrix</button>
        <h1 id="result"></h1>
    </div>
</div>
</body>
<script>
    async function add(){
        const n1= document.getElementById("num1").value;
        const n2= document.getElementById("num2").value;
        const response = await fetch (`http://localhost:8080/calc/add/${n1}/${n2}`);
        const res = await response.text();
        document.getElementById("result").innerText = res;
    }
    async function sub(){
        const n1= document.getElementById("num1").value;
        const n2= document.getElementById("num2").value;
        const response = await fetch (`http://localhost:8080/calc/sub/${n1}/${n2}`);
        const res = await response.text();
        document.getElementById("result").innerText = res;
    }
    async function mul(){
        const n1 = document.getElementById("num1").value;
        const n2 = document.getElementById("num2").value;
        const response = await fetch(`http://localhost:8080/calc/mul/${n1}/${n2}`);
        const res = await response.text();
        document.getElementById("result").innerText = res;
    }

    async function div(){
        const n1 = document.getElementById("num1").value;
        const n2 = document.getElementById("num2").value;
        const response = await fetch(`http://localhost:8080/calc/div/${n1}/${n2}`);
        const res = await response.text();
        document.getElementById("result").innerText = res;
    }

    async function pow(){
        const n1 = document.getElementById("num1").value;
        const n2 = document.getElementById("num2").value;
        const response = await fetch(`http://localhost:8080/calc/pow/${n1}/${n2}`);
        const res = await response.text();
        document.getElementById("result").innerText = res;
    }

    async function sqrt(){
        const n1 = document.getElementById("num1").value;
        const response = await fetch(`http://localhost:8080/calc/sqrt/${n1}`);
        const res = await response.text();
        document.getElementById("result").innerText = res;
    }

    async function sin(){
        const n1 = document.getElementById("num1").value;
        const response = await fetch(`http://localhost:8080/calc/sin/${n1}`);
        const res = await response.text();
        document.getElementById("result").innerText = res;
    }

    async function cos(){
        const n1 = document.getElementById("num1").value;
        const response = await fetch(`http://localhost:8080/calc/cos/${n1}`);
        const res = await response.text();
        document.getElementById("result").innerText = res;
    }

    async function tan(){
        const n1 = document.getElementById("num1").value;
        const response = await fetch(`http://localhost:8080/calc/tan/${n1}`);
        const res = await response.text();
        document.getElementById("result").innerText = res;
    }
    async function log(){
        const n1 = document.getElementById("num1").value;
        const response = await fetch(`http://localhost:8080/calc/log/${n1}`);
        document.getElementById("result").innerText =
            await response.text();
    }
    async function spiral(){
        const response = await fetch(`http://localhost:8080/calc/spiralmatrix`);
        document.getElementById("result").innerText = await response.text();
    }
</script>
</html>
